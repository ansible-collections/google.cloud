---
name: google.cloud.gcloud
on:
  push:
    paths:
      - roles/gcloud/**
      - .github/workflows/gcloud.yml
      - molecule/gcloud/**
  pull_request:
    paths:
      - roles/gcloud/**
      - .github/workflows/gcloud.yml
      - molecule/gcloud/**

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/

jobs:
  molecule:
    runs-on: ubuntu-latest
    env:
      PY_COLORS: 1
      ANSIBLE_FORCE_COLOR: 1
    strategy:
      fail-fast: true
      matrix:
        molecule_playbook:
          - archive_playbook.yml
          - package_playbook.yml
        collection_role:
          - gcloud
    steps:
      - name: Check out code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          path: ansible_collections/google/cloud

      - name: Set up Python 3.11
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get install -y apt-transport-https ca-certificates curl gnupg \
            lsb-release
          curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo gpg \
            --dearmor -o /usr/share/keyrings/docker-archive-keyring.gpg
          echo \
            "deb [arch=amd64 signed-by=/usr/share/keyrings/docker-archive-keyring.gpg] https://download.docker.com/linux/ubuntu \
            $(lsb_release -cs) stable" | sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
          sudo apt-get update
          sudo apt-get install -y docker-ce docker-ce-cli containerd.io
          python -m pip install --upgrade pip
          pip install molecule-plugins[docker] yamllint ansible ansible-lint docker

      - name: Run role test
        working-directory: ansible_collections/google/cloud
        run: >-
          molecule --version &&
          ansible --version &&
          MOLECULE_PLAYBOOK=${{ matrix.molecule_playbook }}
          MOLECULE_NO_LOG="false"
          molecule --debug test -s ${{ matrix.collection_role }}
